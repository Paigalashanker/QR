```html
<!DOCTYPE html>
<html>
<head>
<title>QR Code Generator(dev)</title>

<style>

body{
font-family: Arial;
text-align:center;
margin-top:50px;
background:#f4f4f4;
}

h2{
margin-bottom:20px;
}

input{
padding:10px;
width:280px;
}



button{
padding:10px 20px;
margin:5px;
cursor:pointer;
}

#downloadBtn{
display:none;
margin-top:12px;
}

#qrcode{
margin-top:25px;
background:white;
padding:20px;
display:inline-block;
border-radius:8px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

</style>

</head>

<body>

<h2>QR Code Generator 🔳</h2>

<input type="text" id="text" placeholder="Enter text or website">

<br><br>

<button onclick="generateQR()">Generate</button>
<button onclick="clearQR()">Clear</button>

<div id="qrcode"></div>
<br>
<button id="downloadBtn" onclick="downloadQR()">Download</button>

<script src="https://cdn.jsdelivr.net/npm/qrcodejs/qrcode.min.js"></script>

<script>

function generateQR(){

let text=document.getElementById("text").value.trim();

if(!text){
alert("Please enter text or link");
return;
}

if(!text.startsWith("http") && text.includes(".")){
text="https://"+text;
}

let size=200;

document.getElementById("qrcode").innerHTML="";

new QRCode(document.getElementById("qrcode"),{
text:text,
width:Number(size),
height:Number(size)
});

document.getElementById("downloadBtn").style.display="inline-block";

}

function downloadQR(){

let img=document.querySelector("#qrcode img");
let canvas=document.querySelector("#qrcode canvas");

if(!img && !canvas){
alert("Generate QR first");
return;
}

// Draw QR onto a new canvas with white background
let tempCanvas=document.createElement("canvas");
let src=img||canvas;
let padding=20;
tempCanvas.width=src.width+padding*2;
tempCanvas.height=src.height+padding*2;
let ctx=tempCanvas.getContext("2d");
ctx.fillStyle="#ffffff";
ctx.fillRect(0,0,tempCanvas.width,tempCanvas.height);

if(img){
let image=new Image();
image.onload=function(){
ctx.drawImage(image,padding,padding);
let link=document.createElement("a");
link.href=tempCanvas.toDataURL("image/png");
link.download="qr-code.png";
link.click();
};
image.src=img.src;
}else{
ctx.drawImage(canvas,padding,padding);
let link=document.createElement("a");
link.href=tempCanvas.toDataURL("image/png");
link.download="qr-code.png";
link.click();
}

}

function clearQR(){

document.getElementById("qrcode").innerHTML="";
document.getElementById("text").value="";
document.getElementById("downloadBtn").style.display="none";

}

</script>

</body>
</html>
```
