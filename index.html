<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>QR Code Generator</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="css/style.css">
</head>
<body>
	<div class="orb one"></div>
	<div class="orb two"></div>
	<div class="orb three"></div>

	<main class="app" aria-label="QR code generator">
		<h1>QR Code Generator</h1>
		<p class="subtitle">Enter text or a URL and generate a downloadable QR image.</p>

		<div class="stack">
			<label for="text">Text or URL</label>
			<input type="text" id="text" placeholder="Example: https://example.com">

			<div class="actions">
				<button id="generateBtn" class="primary" type="button">Generate</button>
				<button id="clearBtn" class="ghost" type="button">Clear</button>
			</div>
		</div>

		<div id="qrcode" aria-live="polite">
			<p class="placeholder">Your QR code will appear here.</p>
		</div>

		<div class="download-row">
			<label for="filename">File name</label>
			<input type="text" id="filename" placeholder="my-qr-code">
			<button id="downloadBtn" class="primary" type="button">Download PNG</button>
		</div>

		<p id="status" class="status" aria-live="polite"></p>
	</main>

	<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
	<script src="js/script.js"></script>
</body>
</html>
